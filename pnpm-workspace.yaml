packages:
  - scripts
  - packages/*
  - examples/**
  - website
  - docs
  # Exclude build output; SSR examples emit a dist/package.json that pnpm would
  # otherwise register as a workspace package and write into the lockfile.
  - "!**/dist/**"
  - "!**/dist"

strictDepBuilds: false
allowBuilds:
  "@clerk/shared": false
  "@firebase/util": false
  browser-tabs-lock: false
  bufferutil: false
  core-js: false
  esbuild: true
  lefthook: false
  nx: false
  protobufjs: false
  sharp: false
  utf-8-validate: false
  workerd: false

catalog:
  "@testing-library/dom": 10.4.1
  "@testing-library/jest-dom": 6.9.1
  "@testing-library/react": 16.3.2
  "@testing-library/user-event": 14.6.1
  "@types/node": 22.19.1
  "@types/react": 19.2.17
  "@types/react-dom": 19.2.3
  "@types/react-is": 19.2.0
  happy-dom: 20.10.2
  react: 19.2.7
  react-dom: 19.2.7
  react-is: 19.2.7
  tsdown: 0.22.0
  "@tsdown/css": 0.22.0
  typescript: 6.0.3
  "@typescript/native-preview": 7.0.0-dev.20260624.1
  graphql: 16.14.0
  zod: 4.4.3

minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - zudoku
  - unhead
  - "@unhead/*"
  - tmp@0.2.7
  - protobufjs@7.6.3
  - form-data@4.0.6
  - protobufjs@7.6.1
  - dompurify@3.4.7
  - dompurify@3.4.6
  - dompurify@3.4.9
  - dompurify@3.4.8
  - dompurify@3.4.11
  - js-yaml@3.15.0
  - js-yaml@4.1.2

overrides:
  "@grpc/grpc-js": ">=1.9.16 <2"
  dompurify@<3.4.7: ^3.4.7
  dompurify@<3.4.9: ^3.4.9
  dompurify@<=3.4.10: ^3.4.11
  dompurify@<=3.4.5: ^3.4.6
  dompurify@<=3.4.6: ^3.4.7
  dompurify@>=3.0.0 <=3.4.7: ^3.4.8
  form-data@>=4.0.0 <4.0.6: ^4.0.6
  js-yaml@<3.15.0: ^3.15.0
  js-yaml@>=4.0.0 <=4.1.1: ^4.1.2
  protobufjs@<=7.6.0: ^7.6.1
  protobufjs@<=7.6.2: ^7.6.3
  tmp@>=0.2.6 <0.2.7: ^0.2.7
  ws: ">=8.20.1 <9"

patchedDependencies:
  decode-named-character-reference@1.2.0: patches/decode-named-character-reference@1.2.0.patch
