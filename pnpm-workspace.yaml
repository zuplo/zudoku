packages:
  - scripts
  - packages/*
  - examples/**
  - website
  - docs
  # Exclude build output; SSR examples emit a dist/package.json that pnpm would
  # otherwise register as a workspace package and write into the lockfile.
  - "!**/dist/**"
  - "!**/dist"

strictDepBuilds: false
allowBuilds:
  "@clerk/shared": false
  "@firebase/util": false
  browser-tabs-lock: false
  bufferutil: false
  core-js: false
  esbuild: true
  lefthook: false
  nx: false
  protobufjs: false
  sharp: false
  utf-8-validate: false
  workerd: false

catalog:
  "@testing-library/dom": 10.4.1
  "@testing-library/jest-dom": 6.9.1
  "@testing-library/react": 16.3.2
  "@testing-library/user-event": 14.6.1
  "@types/node": 22.19.1
  "@types/react": 19.2.17
  "@types/react-dom": 19.2.3
  "@types/react-is": 19.2.0
  happy-dom: 20.10.2
  react: 19.2.7
  react-dom: 19.2.7
  react-is: 19.2.7
  tsdown: 0.22.0
  typescript: 6.0.3
  graphql: 16.14.0
  zod: 4.4.3

minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - zudoku
  - unhead
  - "@unhead/*"

overrides:
  "@grpc/grpc-js": ">=1.9.16 <2"
  ws: ">=8.20.1 <9"

patchedDependencies:
  decode-named-character-reference@1.2.0: patches/decode-named-character-reference@1.2.0.patch

# These plugins type-import `unified` without declaring it, so they resolve it
# from pnpm's hidden hoist. That breaks when another dependency tree pulls in
# an old unified major (e.g. @changesets/release-utils -> unified@8) and wins
# the hoist slot. Declare the missing dep so they always get unified@11 types.
packageExtensions:
  remark-directive-rehype:
    dependencies:
      unified: "^11.0.0"
  "@lekoarts/rehype-meta-as-attributes":
    dependencies:
      unified: "^11.0.0"
