name: Public Package Build
on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".tool-versions"
          cache: "pnpm"

      # Install + build from the real registry before verdaccio exists, so the
      # full dependency tree is fetched normally (fast) and cached in the pnpm
      # store. The later reinstall is --prefer-offline, so it serves everything
      # from that store and only pulls zudoku@local from verdaccio.
      - name: Install workspace dependencies
        run: pnpm install --ignore-scripts

      - name: Build zudoku
        run: pnpm -F zudoku build

      # publish: $all allows anonymous publish; the dummy authToken is only
      # there because npm requires a token to be present regardless.
      - name: Start local npm registry
        run: |
          cat > "$RUNNER_TEMP/verdaccio.yaml" <<'EOF'
          storage: /tmp/verdaccio-storage
          uplinks:
            npmjs:
              url: https://registry.npmjs.org/
          packages:
            "**":
              access: $all
              publish: $all
              proxy: npmjs
          log: { type: stdout, format: pretty, level: warn }
          EOF
          log=$(mktemp)
          pnpm dlx verdaccio --config "$RUNNER_TEMP/verdaccio.yaml" &>"$log" &
          grep -q 'http address' <(tail -f "$log")
          echo "//localhost:4873/:_authToken=fake" >> ~/.npmrc

      # Mutates packages/zudoku/package.json in-place for the runner. Any step
      # after this that re-runs `pnpm install --frozen-lockfile` will fail.
      # --no-git-checks: the build above leaves generated files in the tree, and
      # pnpm 11's `pnpm version` refuses to run on an unclean tree otherwise.
      - name: Publish zudoku to local registry
        working-directory: packages/zudoku
        run: |
          pnpm version prerelease --preid local --git-tag-version=false --commit-hooks=false --no-git-checks
          pnpm publish --tag local --registry http://localhost:4873 --no-git-checks

      - name: Point cosmo-cargo at locally-published zudoku
        run: |
          VERSION=$(pnpm view zudoku@local version --registry http://localhost:4873)
          echo "Using locally-published zudoku version: $VERSION"
          cd examples/cosmo-cargo
          npm pkg set "devDependencies.zudoku=$VERSION"

      - name: Reinstall against local registry
        run: pnpm install --no-frozen-lockfile --prefer-offline --ignore-scripts --registry http://localhost:4873

      - name: Build Cosmo Cargo example
        run: pnpm -F cosmo-cargo build

      - name: Smoke Test
        run: |
          echo "Testing built files in examples/cosmo-cargo/dist"

          if [ ! -f "examples/cosmo-cargo/dist/index.html" ]; then
            echo "::error::index.html not found in build output"
            exit 1
          fi

          if ! grep -q "Cosmo Cargo" examples/cosmo-cargo/dist/index.html; then
            echo "::error::Could not find 'Cosmo Cargo' in index.html"
            echo "index.html content preview:"
            head -n 20 examples/cosmo-cargo/dist/index.html
            exit 1
          fi

          if [ ! -d "examples/cosmo-cargo/dist/assets" ]; then
            echo "::error::Assets directory not found in build output"
            exit 1
          fi

          if ! find examples/cosmo-cargo/dist/assets -name '*.js' -type f | grep -q .; then
            echo "::error::No JavaScript bundles found in assets directory"
            exit 1
          fi

          if ! grep -q "cosmo-cargo-head-test" examples/cosmo-cargo/dist/index.html; then
            echo "::error::Plugin getHead meta tag not found in index.html (head injection broken)"
            echo "Head section:"
            sed -n '/<head/,/<\/head>/p' examples/cosmo-cargo/dist/index.html
            exit 1
          fi
          if ! grep -q "__COSMO_HEAD_TEST" examples/cosmo-cargo/dist/index.html; then
            echo "::error::Plugin getHead script not found in index.html (head injection broken)"
            exit 1
          fi

          echo "✅ Smoke test passed - build output contains expected files and content"
