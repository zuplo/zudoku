name: Build
on:
  workflow_call:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on:
      group: ubuntu-large-runners
    permissions:
      actions: read
      contents: read
      id-token: write
      pull-requests: write

    env:
      COREPACK_ENABLE_STRICT: 0
      ZUDOKU_INTERNAL_DEV: true

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".tool-versions"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - run: pnpm install nx --global

      - uses: nrwl/nx-set-shas@v5

      - run: pnpm check
      - run: nx run-many -t build:ci
      - run: pnpm test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/

      - name: Restore base coverage
        if: github.event_name == 'pull_request'
        id: base-coverage
        uses: actions/cache/restore@v5
        with:
          path: coverage-base/coverage-summary.json
          key: coverage-base-
          restore-keys: coverage-base-

      - name: Save base coverage
        if: github.ref == 'refs/heads/main'
        run: mkdir -p coverage-base && cp coverage/coverage-summary.json coverage-base/

      - name: Save base coverage cache
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v5
        with:
          path: coverage-base/coverage-summary.json
          key: coverage-base-${{ github.sha }}

      - name: Coverage report comment (with comparison)
        if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork && steps.base-coverage.outputs.cache-matched-key != ''
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-summary-compare-path: coverage-base/coverage-summary.json

      - name: Coverage report comment
        if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork && steps.base-coverage.outputs.cache-matched-key == ''
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json

      - name: Get Variables
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Version (Canary)
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        run: nx release version --specifier 0.0.0-${{ steps.vars.outputs.sha_short }} --git-tag=false

      - name: Publish Modules
        if: github.ref != 'refs/heads/main'
        run: pnpm publish --provenance --filter zudoku --filter create-zudoku --filter config --tag canary --no-git-checks

      - name: Build Examples
        run: nx run-many -t build --projects=tag:example --exclude=mermaid,many-apis

      - name: Install Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E Tests
        run: pnpm test:e2e

      - name: Check Bundle Size
        run: pnpm size

  check-links:
    name: Check Links
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".tool-versions"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - run: pnpm install nx --global

      - run: nx run docs:build

      - name: Restore lychee cache
        id: restore-cache
        uses: actions/cache/restore@v5
        with:
          path: .lycheecache
          key: cache-lychee-v4-${{ github.sha }}
          restore-keys: cache-lychee-v4-

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config ./docs/lychee.toml
            --remap "https://zudoku.dev file://${{ github.workspace }}/docs/dist"
            --fallback-extensions html
            --cache
            --max-cache-age 1d
            --root-dir $PWD/docs/dist
            --include-fragments
            ./docs/dist
      - name: Save lychee cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: .lycheecache
          key: ${{ steps.restore-cache.outputs.cache-primary-key }}
