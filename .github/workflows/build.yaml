name: Build
on:
  workflow_call:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build & Test
    runs-on:
      group: ubuntu-large-runners
    permissions:
      actions: read
      contents: read
      id-token: write
      pull-requests: write

    env:
      COREPACK_ENABLE_STRICT: 0
      ZUDOKU_INTERNAL_DEV: true

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: ".tool-versions"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - run: pnpm install nx --global

      - uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5

      - name: Detect monetization plugin changes
        if: github.event_name == 'pull_request'
        id: monetization-changes
        # Pinned to commit SHA for security. Tag: v3
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36
        with:
          filters: |
            monetization:
              - 'packages/plugin-zuplo-monetization/**'

      - run: pnpm check

      - name: Typecheck monetization plugin
        if: github.event_name == 'pull_request' && steps.monetization-changes.outputs.monetization == 'true'
        run: pnpm --filter @zuplo/zudoku-plugin-monetization run typecheck

      - run: nx run-many -t build:ci
      - run: pnpm test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/

      - name: Restore base coverage
        if: github.event_name == 'pull_request'
        id: base-coverage
        uses: actions/cache/restore@v6
        with:
          path: coverage-base/coverage-summary.json
          key: coverage-base-
          restore-keys: coverage-base-

      - name: Save base coverage
        if: github.ref == 'refs/heads/main'
        run: mkdir -p coverage-base && cp coverage/coverage-summary.json coverage-base/

      - name: Save base coverage cache
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v6
        with:
          path: coverage-base/coverage-summary.json
          key: coverage-base-${{ github.sha }}

      - name: Coverage report comment (with comparison)
        if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork && steps.base-coverage.outputs.cache-matched-key != ''
        uses: davelosert/vitest-coverage-report-action@3c054a2d2e2ca45446417ad5d6d5eb33092af8f1 # v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-summary-compare-path: coverage-base/coverage-summary.json

      - name: Coverage report comment
        if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork && steps.base-coverage.outputs.cache-matched-key == ''
        uses: davelosert/vitest-coverage-report-action@3c054a2d2e2ca45446417ad5d6d5eb33092af8f1 # v2
        with:
          json-summary-path: coverage/coverage-summary.json

      - name: Get Variables
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Version (Canary)
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        run: nx release version --specifier 0.0.0-${{ steps.vars.outputs.sha_short }} --git-tag=false

      - name: Publish Modules
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        run: pnpm publish --provenance --filter zudoku --filter create-zudoku --filter config --tag canary --no-git-checks

      # Only the examples consumed by later steps (e2e, size-limit, smoke test);
      # all other examples build in the parallel build-examples job
      - name: Build Test Examples
        run: nx run-many -t build --projects=cosmo-cargo,with-base-path

      - name: Smoke Test with-base-path
        run: |
          dist="examples/with-base-path/dist"
          nested="$dist/your-repo"
          fail() { echo "::error::$1"; exit 1; }

          [ -f "$nested/introduction.html" ] || fail "prerendered page missing at $nested/introduction.html"
          [ -f "$nested/api/rick-and-morty/1.0.0/schema.json" ] || fail "schema download missing under $nested/api/"
          [ -f "$nested/llms.txt" ] || fail "llms.txt missing under $nested/"
          find "$nested/assets" -name '*.js' -type f | grep -q . || fail "no JS bundles in $nested/assets"
          [ -f "$dist/404.html" ] || fail "status page 404.html missing at dist root"

          grep -q 'rel="icon" href="/your-repo/favicon.svg"' "$nested/introduction.html" \
            || fail "favicon href missing /your-repo prefix"

          grep -q 'href="/your-repo/assets/' "$nested/introduction.html" \
            || fail "asset URLs missing /your-repo prefix"

          echo "✅ with-base-path smoke test passed"

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node --print "require('@playwright/test/package.json').version")" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      # On a cache miss, --with-deps installs the browser and its system
      # libraries. On a cache hit those libraries are already present in the
      # runner image, so no install-deps step is needed.
      - name: Install Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E Tests
        run: pnpm test:e2e

      - name: Check Bundle Size
        run: pnpm size

  build-examples:
    name: Build Examples
    runs-on:
      group: ubuntu-large-runners
    permissions:
      contents: read

    env:
      COREPACK_ENABLE_STRICT: 0
      ZUDOKU_INTERNAL_DEV: true

    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: ".tool-versions"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - run: pnpm install nx --global

      # cosmo-cargo and with-base-path are built and verified in Build & Test
      - name: Build Examples
        run: nx run-many -t build --projects=tag:example --exclude=mermaid,many-apis,cosmo-cargo,with-base-path

  check-links:
    name: Check Links
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: ".tool-versions"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - run: pnpm install nx --global

      - run: nx run docs:build

      - name: Restore lychee cache
        id: restore-cache
        uses: actions/cache/restore@v6
        with:
          path: .lycheecache
          key: cache-lychee-v4-${{ github.sha }}
          restore-keys: cache-lychee-v4-

      - name: Link Checker
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: >-
            --config ./docs/lychee.toml
            --remap "https://zudoku.dev file://${{ github.workspace }}/docs/dist"
            --fallback-extensions html
            --cache
            --max-cache-age 1d
            --root-dir $PWD/docs/dist
            --include-fragments
            ./docs/dist
      - name: Save lychee cache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: .lycheecache
          key: ${{ steps.restore-cache.outputs.cache-primary-key }}
