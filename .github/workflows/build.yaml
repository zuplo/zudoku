name: Build
on:
  workflow_call:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    name: Lint, Typecheck & Test
    runs-on:
      group: ubuntu-large-runners
    permissions:
      contents: read
      pull-requests: write
    env:
      COREPACK_ENABLE_STRICT: 0
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".tool-versions"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - run: pnpm check
      - run: pnpm -r --filter "./packages/*" run --if-present typecheck
      - run: pnpm test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/

      - name: Restore base coverage
        if: github.event_name == 'pull_request'
        id: base-coverage
        uses: actions/cache/restore@v6
        with:
          path: coverage-base/coverage-summary.json
          key: coverage-base-
          restore-keys: coverage-base-

      - name: Save base coverage
        if: github.ref == 'refs/heads/main'
        run: mkdir -p coverage-base && cp coverage/coverage-summary.json coverage-base/

      - name: Save base coverage cache
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v6
        with:
          path: coverage-base/coverage-summary.json
          key: coverage-base-${{ github.sha }}

      - name: Coverage report comment (with comparison)
        if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork && steps.base-coverage.outputs.cache-matched-key != ''
        uses: davelosert/vitest-coverage-report-action@3c054a2d2e2ca45446417ad5d6d5eb33092af8f1 # v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-summary-compare-path: coverage-base/coverage-summary.json

      - name: Coverage report comment
        if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork && steps.base-coverage.outputs.cache-matched-key == ''
        uses: davelosert/vitest-coverage-report-action@3c054a2d2e2ca45446417ad5d6d5eb33092af8f1 # v2
        with:
          json-summary-path: coverage/coverage-summary.json

  integration:
    name: E2E, Smoke & Bundle Size
    runs-on:
      group: ubuntu-large-runners
    permissions:
      contents: read
    env:
      COREPACK_ENABLE_STRICT: 0
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".tool-versions"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - run: pnpm -r --filter "./packages/*" build
      - run: pnpm -F zudoku build:standalone
      # E2E previews cosmo-cargo's build; with-base-path/bundle-size need their dist.
      - run: pnpm -F cosmo-cargo -F with-base-path build

      - name: Smoke Test with-base-path
        run: |
          dist="examples/with-base-path/dist"
          nested="$dist/your-repo"
          fail() { echo "::error::$1"; exit 1; }

          [ -f "$nested/introduction.html" ] || fail "prerendered page missing at $nested/introduction.html"
          [ -f "$nested/api/rick-and-morty/1.0.0/schema.json" ] || fail "schema download missing under $nested/api/"
          [ -f "$nested/llms.txt" ] || fail "llms.txt missing under $nested/"
          find "$nested/assets" -name '*.js' -type f | grep -q . || fail "no JS bundles in $nested/assets"
          [ -f "$dist/404.html" ] || fail "status page 404.html missing at dist root"

          grep -q 'rel="icon" href="/your-repo/favicon.svg"' "$nested/introduction.html" \
            || fail "favicon href missing /your-repo prefix"

          grep -q 'href="/your-repo/assets/' "$nested/introduction.html" \
            || fail "asset URLs missing /your-repo prefix"

          echo "✅ with-base-path smoke test passed"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E Tests
        run: pnpm test:e2e

      - name: Check Bundle Size
        run: pnpm size

  build-examples:
    name: Build Examples
    runs-on:
      group: ubuntu-large-runners
    permissions:
      contents: read
    env:
      COREPACK_ENABLE_STRICT: 0
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".tool-versions"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - run: pnpm -r --filter "./packages/*" build
      - run: pnpm -r --filter "./examples/**" --filter "!mermaid" --filter "!many-apis" build

  # Aggregate status for branch protection: one required check covering the
  # jobs that replaced the former monolithic "Build & Test" job.
  build-and-test:
    name: Build & Test
    needs: [quality, integration, build-examples]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: echo "::error::a required job did not succeed" && exit 1
      - run: echo "all required jobs passed"

  check-links:
    name: Check Links
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".tool-versions"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - run: pnpm -F 'docs...' build

      - name: Restore lychee cache
        id: restore-cache
        uses: actions/cache/restore@v6
        with:
          path: .lycheecache
          key: cache-lychee-v4-${{ github.sha }}
          restore-keys: cache-lychee-v4-

      - name: Link Checker
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: >-
            --config ./docs/lychee.toml
            --remap "https://zudoku.dev file://${{ github.workspace }}/docs/dist"
            --fallback-extensions html
            --cache
            --max-cache-age 1d
            --root-dir $PWD/docs/dist
            --include-fragments
            ./docs/dist
      - name: Save lychee cache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: .lycheecache
          key: ${{ steps.restore-cache.outputs.cache-primary-key }}
