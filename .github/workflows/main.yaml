name: Release
on:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on:
      group: ubuntu-large-runners
    permissions:
      contents: write
      id-token: write
      pull-requests: write

    steps:
      - name: Generate zudoku release token
        id: zudoku-release-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.ZUDOKU_RELEASE_APP_ID }}
          private-key: ${{ secrets.ZUDOKU_RELEASE_APP_PRIVATE_KEY }}
          owner: zuplo
          repositories: zudoku
          permission-contents: write
          permission-pull-requests: write

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ steps.zudoku-release-token.outputs.token }}

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".tool-versions"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      # OIDC trusted publishing needs npm >= 11.5.1; the pinned Node ships npm 10.
      - run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - run: git config --global user.email "integrations@zuplo.com"
      - run: git config --global user.name "Zuplo Integrations"

      - run: pnpm check
      - run: pnpm -r --filter "./packages/*" build
      - run: pnpm -r --filter "./packages/*" run --if-present typecheck
      - run: pnpm test

      - name: Copy readme
        run: cp README.md packages/zudoku

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          version: pnpm run version-packages
          # --no-git-tag so create-zudoku (version-locked to zudoku, but an
          # implementation detail) never gets a tag or GitHub release; tags and
          # releases for the other packages are created in the next step.
          publish: pnpm exec changeset publish --no-git-tag
          createGithubReleases: false
          commit: "chore(release): publish"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ steps.zudoku-release-token.outputs.token }}
          # Empty NPM_TOKEN forces npm CLI to fall back to OIDC trusted
          # publishing. See https://github.com/changesets/changesets/issues/1152.
          NPM_TOKEN: ""
          NPM_CONFIG_PROVENANCE: "true"

      - name: Create tags and GitHub releases
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: pnpm tsx .github/scripts/create-github-releases.ts

      - name: Detect zudoku release
        if: steps.changesets.outputs.published == 'true'
        id: zudoku-release
        env:
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          set -euo pipefail
          VERSION=$(jq -er '.[] | select(.name=="zudoku") | .version' <<< "$PUBLISHED" || true)
          if [ -n "$VERSION" ]; then
            echo "zudoku released: $VERSION"
          else
            echo "no zudoku release in this publish"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - run: pnpm -F zudoku build:standalone
        if: steps.zudoku-release.outputs.version != ''

      - name: Authenticate to Google Cloud
        if: steps.zudoku-release.outputs.version != ''
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          token_format: access_token
          workload_identity_provider: ${{ vars.GCP_ACTIONS_IDENTITY_PROVIDER }}
          service_account: github-actions-opensource@zuplo-production.iam.gserviceaccount.com
          access_token_lifetime: 300s

      - name: Upload CSS
        if: steps.zudoku-release.outputs.version != ''
        uses: google-github-actions/upload-cloud-storage@6397bd7208e18d13ba2619ee21b9873edc94427a # v3
        with:
          process_gcloudignore: false
          path: packages/zudoku/standalone
          glob: "**/*.css"
          destination: cdn.zudoku.dev/${{ steps.zudoku-release.outputs.version }}
          parent: false
          headers: |-
            content-type: text/css

      - name: Upload Javascript
        if: steps.zudoku-release.outputs.version != ''
        uses: google-github-actions/upload-cloud-storage@6397bd7208e18d13ba2619ee21b9873edc94427a # v3
        with:
          process_gcloudignore: false
          path: packages/zudoku/standalone
          glob: "**/*.js"
          destination: cdn.zudoku.dev/${{ steps.zudoku-release.outputs.version }}
          parent: false
          headers: |-
            content-type: text/javascript
            cache-control: public,max-age=31536000,immutable

      - name: Upload HTML (Latest)
        if: steps.zudoku-release.outputs.version != ''
        uses: google-github-actions/upload-cloud-storage@6397bd7208e18d13ba2619ee21b9873edc94427a # v3
        with:
          process_gcloudignore: false
          path: packages/zudoku/standalone/index.html
          destination: cdn.zudoku.dev/latest
          parent: false
          headers: |-
            content-type: text/html

      - name: Upload CSS (Latest)
        if: steps.zudoku-release.outputs.version != ''
        uses: google-github-actions/upload-cloud-storage@6397bd7208e18d13ba2619ee21b9873edc94427a # v3
        with:
          process_gcloudignore: false
          path: packages/zudoku/standalone
          glob: "**/*.css"
          destination: cdn.zudoku.dev/latest
          parent: false
          headers: |-
            content-type: text/css

      - name: Upload Javascript (Latest)
        if: steps.zudoku-release.outputs.version != ''
        uses: google-github-actions/upload-cloud-storage@6397bd7208e18d13ba2619ee21b9873edc94427a # v3
        with:
          process_gcloudignore: false
          path: packages/zudoku/standalone
          glob: "**/*.js"
          destination: cdn.zudoku.dev/latest
          parent: false
          headers: |-
            content-type: text/javascript
            cache-control: public,max-age=31536000,immutable

      - name: Clear CDN Cache
        if: steps.zudoku-release.outputs.version != ''
        run: |
          curl --request POST \
          --url https://api.cloudflare.com/client/v4/zones/1abaefabd6800e9979a740a7cdf235a8/purge_cache \
          --header 'Content-Type: application/json' \
          --header 'Authorization: Bearer ${{ secrets.CF_ZONE_PURGE_ACCESS_TOKEN }}' \
          --data '{ "purge_everything": true }'

      - name: Generate downstream trigger token
        if: steps.changesets.outputs.published == 'true'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.ZUDOKU_GH_APP_ID }}
          private-key: ${{ secrets.ZUDOKU_GH_APP_PRIVATE_KEY }}
          owner: zuplo
          repositories: |
            docs
            core
            www

      - name: Trigger Zudoku docs update
        if: steps.zudoku-release.outputs.version != ''
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh workflow run update-zudoku.yaml --repo zuplo/docs --ref main

      - name: Trigger zudoku-builder rebuild
        if: steps.changesets.outputs.published == 'true' && (steps.zudoku-release.outputs.version != '' || contains(steps.changesets.outputs.publishedPackages, '@zuplo/zudoku-plugin-monetization'))
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh workflow run zudoku-builder.yaml --repo zuplo/core --ref main

      - name: Trigger Zuplo Docs Update
        if: steps.zudoku-release.outputs.version != ''
        run: curl ${{ secrets.VERCEL_DOCS_WEBHOOK_URL }}
