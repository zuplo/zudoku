"""
A simple e-commerce GraphQL API example.
"""
type Query {
  """
  Get a product by ID
  """
  product(id: ID!): Product

  """
  List all products with optional filtering
  """
  products(
    """
    Filter products by category
    """
    category: String
    """
    Maximum number of results to return
    """
    limit: Int = 10
    """
    Offset for pagination
    """
    offset: Int = 0
  ): ProductConnection!

  """
  Get the current user
  """
  me: User

  """
  Search for products by name or description
  """
  searchProducts(query: String!): [Product!]!
}

type Mutation {
  """
  Create a new product
  """
  createProduct(input: CreateProductInput!): Product!

  """
  Update an existing product
  """
  updateProduct(id: ID!, input: UpdateProductInput!): Product

  """
  Delete a product
  """
  deleteProduct(id: ID!): Boolean!

  """
  Add a product to the cart
  """
  addToCart(productId: ID!, quantity: Int!): Cart!

  """
  Remove a product from the cart
  """
  removeFromCart(productId: ID!): Cart!

  """
  Place an order from the current cart
  """
  checkout(input: CheckoutInput!): Order!
}

type Subscription {
  """
  Subscribe to product updates
  """
  productUpdated(id: ID!): Product!

  """
  Subscribe to new orders
  """
  orderCreated: Order!
}

"""
A product in the catalog
"""
type Product {
  """
  Unique identifier
  """
  id: ID!
  """
  Product name
  """
  name: String!
  """
  Product description
  """
  description: String
  """
  Price in cents
  """
  price: Int!
  """
  Category of the product
  """
  category: Category!
  """
  Images of the product
  """
  images: [String!]!
  """
  Available stock quantity
  """
  stock: Int!
  """
  Date the product was created
  """
  createdAt: DateTime!
  """
  Reviews for this product. Can be Markdown text with embedded HTML ensured to be sanitized on the client side.
  """
  reviews: [Review!]!
  """
  Average rating (1-5)
  """
  averageRating: Float
}

"""
A paginated list of products
"""
type ProductConnection {
  """
  List of products
  """
  items: [Product!]!
  """
  Total number of products matching the query
  """
  totalCount: Int!
  """
  Whether there are more results
  """
  hasNextPage: Boolean!
}

"""
A product category
"""
type Category {
  """
  Unique identifier
  """
  id: ID!
  """
  Category name
  """
  name: String!
  """
  Parent category, if any
  """
  parent: Category
  """
  Products in this category
  """
  products: [Product!]!
}

"""
A user in the system
"""
type User {
  """
  Unique identifier
  """
  id: ID!
  """
  User's email address
  """
  email: String!
  """
  User's display name
  """
  name: String!
  """
  User's orders
  """
  orders: [Order!]!
  """
  User's shopping cart
  """
  cart: Cart
  """
  User's shipping addresses
  """
  addresses: [Address!]!
}

"""
A shopping cart
"""
type Cart {
  """
  Unique identifier
  """
  id: ID!
  """
  Items in the cart
  """
  items: [CartItem!]!
  """
  Total price in cents
  """
  total: Int!
}

"""
An item in a shopping cart
"""
type CartItem {
  """
  The product
  """
  product: Product!
  """
  Quantity
  """
  quantity: Int!
  """
  Subtotal in cents
  """
  subtotal: Int!
}

"""
A customer order
"""
type Order {
  """
  Unique identifier
  """
  id: ID!
  """
  Order status
  """
  status: OrderStatus!
  """
  Items in the order
  """
  items: [OrderItem!]!
  """
  Total price in cents
  """
  total: Int!
  """
  Shipping address
  """
  shippingAddress: Address!
  """
  Date the order was placed
  """
  createdAt: DateTime!
  """
  Date the order was last updated
  """
  updatedAt: DateTime!
}

"""
An item in an order
"""
type OrderItem {
  """
  The product
  """
  product: Product!
  """
  Quantity ordered
  """
  quantity: Int!
  """
  Price at time of order (in cents)
  """
  price: Int!
}

"""
A shipping address
"""
type Address {
  """
  Unique identifier
  """
  id: ID!
  """
  Street address
  """
  street: String!
  """
  City
  """
  city: String!
  """
  State/Province
  """
  state: String!
  """
  Postal code
  """
  postalCode: String!
  """
  Country
  """
  country: String!
}

"""
A product review
"""
type Review {
  """
  Unique identifier
  """
  id: ID!
  """
  The user who wrote the review
  """
  author: User!
  """
  Rating (1-5)
  """
  rating: Int!
  """
  Review text
  """
  comment: String
  """
  Date the review was created
  """
  createdAt: DateTime!
}

"""
Order status
"""
enum OrderStatus {
  """
  Order has been placed but not yet processed
  """
  PENDING
  """
  Order is being prepared
  """
  PROCESSING
  """
  Order has been shipped
  """
  SHIPPED
  """
  Order has been delivered
  """
  DELIVERED
  """
  Order has been cancelled
  """
  CANCELLED
}

"""
Input for creating a new product
"""
input CreateProductInput {
  """
  Product name
  """
  name: String!
  """
  Product description
  """
  description: String
  """
  Price in cents
  """
  price: Int!
  """
  Category ID
  """
  categoryId: ID!
  """
  Initial stock quantity
  """
  stock: Int!
  """
  Image URLs
  """
  images: [String!]
}

"""
Input for updating a product
"""
input UpdateProductInput {
  """
  Product name
  """
  name: String
  """
  Product description
  """
  description: String
  """
  Price in cents
  """
  price: Int
  """
  Category ID
  """
  categoryId: ID
  """
  Stock quantity
  """
  stock: Int
  """
  Image URLs
  """
  images: [String!]
}

"""
Input for checkout
"""
input CheckoutInput {
  """
  Shipping address ID
  """
  shippingAddressId: ID!
  """
  Payment method ID
  """
  paymentMethodId: String!
}

"""
A date-time string in ISO 8601 format
"""
scalar DateTime
